<style type='text/css'>

:root {
	--card-around : 1em;
	--text-spacing : 0.3em;
	--question-width : 10em; 
}

.cCheck::before {
	content : "\2705";
	margin-right : var(--text-spacing);
}

#iStage1st {
	position : relative;
	overflow : hidden;
	background-color : #eeeeee;
	-webkit-mask-image : linear-gradient(
		to bottom,
		black 0%,
		black 50%,
		transparent 100%
	);
	mask-image: linear-gradient(
		to bottom,
		black 0%,
		black 50%,
		transparent 100%
	);
}

#iTestList {
	padding-top : var(--card-around);
	transition : transform 0.40s cubic-bezier(.22,.61,.36,1);
}

.cCard {
	margin : var(--card-around);
}

.cControl {
	position : relative;
	height : 1.5em;
}

.cControl .cLCaption {
	position : absolute;
	left : 0px;
	width : var(--question-width);
}

.cControl .cControlInput {
	position: absolute;
	left : calc(var(--question-width) + 1.5em);
}

.cControl label {
	padding : 0.2em 0.5em;
	border-radius : 99px;
}

.cControl label span {
	margin-left : var(--text-spacing);
}

.cControl label:hover {
	background-color : yellow;
}

.cDisabled .cControl {
	pointer-events : none;
}

#iBack {
	appearance : none;
	-webkit-appearance : none;
	background : none;
	border : none;
	position : absolute;
	right : 20px;
	top : 50%;
	transform : translateY(-50%) translateX(-50%);
	z-index : 10;
	width : 2.5em;
	transition : transform 0.15s ease, opacity 0.15s ease;
}

#iBack svg {
	width : 40px;
	display: block;
	transition: transform 0.15s ease;
}

#iBack:hover svg {
	transform: scale(1.10);
}

#iBack:active svg {
	transform: scale(0.90);
}

</style>

function composeResult(in_callback) {
	const result = {llmSummary : [], llmQaArr : [], uiScores : {}, uiTrait : {}};
	/*
		|
		+- llmSummary
		|	|
		|	+- [0]
		|	|
		|	+- ...
		|
		+- llmQaArr
		|	|
		|	+- [0]
		|	|	|
		|	|	+- q : 'xxx'
		|	|	|
		|	|	+- a : 'yyy'
		|	|
		|	+- ...
		|
		+- uiScores
		|	|
		|	+- 'openType-1'
		|	|	|
		|	|	+- full : 99
		|	|	|
		|	|	+- user : 99
		|	|	|
		|	|	+- rank : 99
		|	|
		|	+- ...
		|
		+- uiTrait
			|
			+- lv1 / lv2 / lv3
				|
				+- [0]
				|
				+- ...
	*/
	// 0. initialize
	Object.values(TYPES).forEach(in_openType => {
		result.uiScores[in_openType] = {full : QUESTIONS.length, user : 0, rank : 0};
	});
	// 1. scoring
	const positiveArr = [];
	const negativeArr = [];
	for (let qIx = 0; qIx < QUESTIONS.length; qIx++) {
		const {aPosiKey, aNegaKey} = (in_callback)(qIx);
		result.uiScores[aPosiKey].user++;
		result.uiScores[aNegaKey].user--;
		positiveArr.push(i18n.defaultLangText(QUESTIONS[qIx][aPosiKey]));
		negativeArr.push(i18n.defaultLangText(QUESTIONS[qIx][aNegaKey]));
	}
	result.llmQaArr.push({
		q : 'Traits you selected as most characteristic',
		a : positiveArr.join(', ')
	});
	result.llmQaArr.push({
		q : 'Traits you selected as least characteristic',
		a : negativeArr.join(', ')
	});
	// 2. ranking + adhoc trick for tie-break
	const tempArr = Object.entries(result.uiScores).map(([in_openType, in_score]) =>
		({openType : in_openType, user : in_score.user, full : in_score.full}));
	tempArr.sort((a, b) => b.user - a.user);
	result.uiScores[tempArr[1].openType].user--;
	tempArr[1].user--;
	tempArr.forEach((in_e, in_ix) => result.uiScores[in_e.openType].rank = in_ix + 1);
	// 3. enriching according to LEVELS
	const summary = {};
	for (const {openType, full, user} of tempArr) {
		const percent = (user / full) * 100;
		for (const [threshold, {LLMPREFIX, UI}] of LEVELS.entries()) {
			if (percent < threshold) {
				continue;
			}
			// summary ( for llmSummary )
			if (!Object.hasOwn(summary, LLMPREFIX)) {
				summary[LLMPREFIX] = [];
			}
			const summaryArr = [
				'(',
				'requires',
				"'" + i18n.defaultLangText(FEATURES[openType].POSITIVE) + "'",
				',',
				'does not like',
				"'" + i18n.defaultLangText(FEATURES[openType].NEGATIVE) + "'",
				')'
			];
			summary[LLMPREFIX].push(openType + summaryArr.join(' '));
			// uiTrait
			if (!Object.hasOwn(result.uiTrait, UI)) {
				result.uiTrait[UI] = [];
			}
			FEATURES[openType].DETAILS.forEach(in_feature => {
				result.uiTrait[UI].push(in_feature);
			});
			break;
		}
	}
	const f = new Intl.ListFormat('en', {style : 'long', type : 'conjunction'});
	if (Object.keys(summary).length > 0) {
		for (const [llmPrefix, featureArr] of Object.entries(summary)) {
			result.llmSummary.push(llmPrefix + f.format(featureArr) + '.');
		}
	} else {
		result.llmSummary.push(LT50LLM + f.format(Object.values(TYPES)) + '.');
	}
	// console.log(result);
	return result;
}

function createUiBar(in_score) {
	/*
		table ( grid + rounded box )
		|
		+- tr
		|	|
		|	+- td
		|	|	|
		|	|	+- bg ( div )
		|	|		|
		|	|		+- fg ( div )
		|	|
		|	+- ...
		|
		+- ...
	*/
	const table = document.createElement('table');
	Object.assign(table.style, {
		width : '90%',
		maxWidth : '600px',
		border: '2px solid #ccc',
		borderRadius: '5px',
		padding : '1em'
	});
	for (const openType of Object.values(TYPES)) {
		const tr = document.createElement('tr');
		table.appendChild(tr);
		const {user, full} = in_score[openType];
		const percent = Math.round((user / full) * 100);
		// label
		const labelCell = document.createElement('td');
		tr.appendChild(labelCell);
		labelCell.style.whiteSpace = 'nowrap';
		labelCell.textContent = openType + ' ( ' + percent + '% )';
		// bar
		const barCell = document.createElement('td');
		tr.appendChild(barCell);
		barCell.style.paddingLeft = '0.5em';
		barCell.style.width = '100%';
		const bgBar = document.createElement('div');
		barCell.appendChild(bgBar);
		bgBar.style.position = 'relative';
		bgBar.style.background = '#dddddd';
		bgBar.style.height = '1em';
		bgBar.style.borderRadius = '0.5em';
		bgBar.style.overflow = 'hidden';
		const fgBar = document.createElement('div');
		bgBar.appendChild(fgBar);
		fgBar.style.background = FEATURES[openType].COLOR;
		fgBar.style.height = '1em';
		fgBar.style.position = 'absolute';
		fgBar.style.top = '0px';
		fgBar.style.left = '50%';
		fgBar.style.width = '0%';
		if (percent === 0) {
			const line = document.createElement('div');
			Object.assign(line.style, {
				position : 'absolute',
				left : '50%',
				top : '0',
				height : '100%',
				borderLeft : '1px dashed #fff'
			});
			bgBar.appendChild(line);
		} else {
			const barWidth = Math.abs(percent) / 2;
			if (percent > 0) {
				fgBar.style.borderRadius = '0 0.5em 0.5em 0';
				setTimeout(() => {
					fgBar.style.transition = 'width 0.8s ease';
					fgBar.style.width = barWidth + '%';
				}, 100);
			} else {
				fgBar.style.borderRadius = '0.5em 0 0 0.5em';
				setTimeout(() => {
					fgBar.style.transition = 'width 0.8s ease, left 0.8s ease';
					fgBar.style.left = (50 - barWidth) + '%';
					fgBar.style.width = barWidth + '%';
				}, 100);
			}
		}
	}
	return wrapping(table);
}

function createUiMatrix(in_score) {
	const rank1 = Object.keys(in_score).find(key => in_score[key].rank === 1);
	const info = FEATURES[rank1];
	const root = document.createElement('div');
	Object.assign(root.style, {
		position : 'relative',
		width : '70%',
		maxWidth : '400px',
		background : info.COLOR + '22',
		border : '2px solid #ccc',
		borderRadius : '5px',
		padding : '2em 1.5em',
		display : 'flex',
		flexDirection : 'column',
		alignItems : 'center',
		gap : '2em'
	});
	const mark = ((in_square_size, in_stroke_size) => {
		const half = in_square_size / 2;
		const r = half - in_stroke_size / 2;
		const adjustment = 0.85;
		const offset = half - (half * adjustment);
		return {
			circle : {
				width : in_stroke_size * adjustment,
				cx : half,
				cy : half,
				r : r
			},
			cross : {
				width : in_stroke_size,
				x11 : offset,
				y11 : offset,
				x12 : in_square_size - offset,
				y12 : in_square_size - offset,
				x21 : in_square_size - offset,
				y21 : offset,
				x22 : offset,
				y22 : in_square_size - offset
			}
		};
	})(100, 25);
	// POSITIVE
	const positive = document.createElement('div');
	Object.assign(positive.style, {
		position : 'relative',
		fontSize : '1em',
		color : 'black',
		textAlign : 'center'
	});
	positive.textContent = info.POSITIVE;
	const positiveMark = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
	positiveMark.setAttribute('viewBox', '0 0 100 100');
	Object.assign(positiveMark.style, {
		position : 'absolute',
		width : '3em',
		height : '3em',
		opacity : '0.30',
		left : '50%',
		top : '50%',
		transform : 'translate(-50%, -50%)'
	});
	positiveMark.innerHTML = [
		'<circle',
		'cx="' + mark.circle.cx + '"',
		'cy="' + mark.circle.cy + '"',
		'r="' + mark.circle.r + '"',
		'fill="none"',
		'stroke="' + info.COLOR + '"',
		'stroke-width="' + mark.circle.width + '"',
		'stroke-linecap="round"',
		'/>'
	].join(' ');
	positive.appendChild(positiveMark);
	root.appendChild(positive);
	// DiSC
	const disc = document.createElement('div');
	disc.textContent = rank1;
	Object.assign(disc.style, {
		fontSize : '3.5em',
		fontWeight : '1000',
		color : info.COLOR,
		textShadow : '-2px -2px 0 #ffffff, 2px -2px 0 #ffffff, -2px  2px 0 #ffffff, 2px  2px 0 #ffffff'
	});
	root.appendChild(disc);
	// NEGATIVE
	const negative = document.createElement('div');
	Object.assign(negative.style, {
		position : 'relative',
		fontSize : '1em',
		color : 'black',
		textAlign : 'center'
	});
	negative.textContent = info.NEGATIVE;
	const negativeMark = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
	negativeMark.setAttribute('viewBox', '0 0 100 100');
	Object.assign(negativeMark.style, {
		position : 'absolute',
		width : '3em',
		height : '3em',
		opacity : '0.30',
		left : '50%',
		top : '50%',
		transform : 'translate(-50%, -50%)'
	});
	negativeMark.innerHTML = [
		'<line',
		'x1="' + mark.cross.x11 + '"',
		'y1="' + mark.cross.y11 + '"',
		'x2="' + mark.cross.x12 + '"',
		'y2="' + mark.cross.y12 + '"',
		'stroke="' + info.COLOR + '"',
		'stroke-width="' + mark.cross.width + '"',
		'/>',
		'<line',
		'x1="' + mark.cross.x21 + '"',
		'y1="' + mark.cross.y21 + '"',
		'x2="' + mark.cross.x22 + '"',
		'y2="' + mark.cross.y22 + '"',
		'stroke="' + info.COLOR + '"',
		'stroke-width="' + mark.cross.width + '"',
		'/>'
	].join(' ');
	negative.appendChild(negativeMark);
	root.appendChild(negative);
	return wrapping(root);
}

function createUiTrait(in_trait, in_resp) {
	const root = document.createElement('div');
	Object.assign(root.style, {
		position: 'relative',
		width : '90%',
		maxWidth : '600px',
		border: '2px solid #ccc',
		borderRadius: '5px',
		padding : '1em'
	});
	const addTrait = in_section => {
		let added = false;
		for (const [labelText, featureArr] of Object.entries(in_trait)) {
			added = true;
			const head = document.createElement('div');
			head.textContent = labelText;
			head.className = 'cCheck';
			in_section.appendChild(head);
			const ul = document.createElement('ul');
			in_section.appendChild(ul);
			featureArr.forEach(in_e => {
				const li = document.createElement('li');
				li.textContent = in_e;
				ul.appendChild(li);
			});
		}
		if (added) {
			in_section.style.marginBottom = '1em';
		}
	};
	const addDesc = (in_section, in_header, in_desc) => {
		const head = document.createElement('div');
		head.textContent = in_header;
		head.className = 'cCheck';
		head.style.marginBottom = '1em';
		in_section.appendChild(head);
		const body = document.createElement('div');
		body.textContent = in_desc;
		in_section.appendChild(body);
		in_section.style.marginBottom = '1em';
	};
	const secArr = [];
	for (let i = 0; i < 3; i++) {
		secArr[i] = document.createElement('section');
		root.appendChild(secArr[i]);
	}
	if (in_resp) {
		addDesc(secArr[0], HEADERS[0], in_resp.adviceForRespondent)
		addTrait(secArr[1]);
		addDesc(secArr[2], HEADERS[1], in_resp.adviceForColleagues)
	} else {
		addTrait(secArr[0]);
		secArr[1].textContent = APIERROR;
	}
	return wrapping(root);
}

function createUiRetry() {
	const button = document.createElement('button');
	Object.assign(button.style, {
		color : '#fff',
		backgroundColor : 'gray',
		padding : '0.5em 1em',
		fontWeight : '600',
		border : '1px solid silver',
		borderRadius : '100px'
	});
	button.textContent = 'Retry';
	button.addEventListener('click', in_ev => {
		gState.transition(cState.BACK);
		(uiStage1st)(false)
	});
	return wrapping(button);
}

function createUiCard(in_qIx) {
	const controlArr = [];
	/*
		|
		+- cCard[0]
		|	|
		|	+- description
		|	|
		|	+- cControl[0]
		|	|	|
		|	|	+- label
		|	|	|	|
		|	|	|	+- radio
		|	|	|	|
		|	|	|	+- span
		|	|	|		|
		|	|	|		+- text
		|	|	|
		|	|	+- label
		|	|		|
		|	|		+- radio
		|	|		|
		|	|		+- span
		|	|			|
		|	|			+- text
		|	|
		|	+- cControl[1]
		|	|
		|	+- ...
		|
		+- cCard[1]
		|
		+- ...
	*/
	Object.entries(QUESTIONS[in_qIx]).forEach(([in_openType, in_text]) => {
		const control = new cControl({
			lCaption : in_text,
			optionArr : OPTIONS,
			initIx : cControl.UNSELECTED,
			render : (in_input, in_currIx) => {
				if (!in_input.hasChildNodes()) {
					OPTIONS.forEach((labelText, ix) => {
						const label = document.createElement('label');
						const radio = document.createElement('input');
						radio.type = 'radio';
						radio.name = 'q' + in_qIx + '_' + in_openType;
						label.appendChild(radio);
						const span = document.createElement('span');
						span.textContent = labelText;
						label.appendChild(span);
						in_input.appendChild(label);
					});
				}
				const radios = in_input.querySelectorAll('input');
				radios.forEach((radio, ix) => {
					radio.checked = (ix === in_currIx);
				});
			},
			transition : (in_ev, in_input, in_currIx) => {
				const radios = in_input.querySelectorAll('input');
				return Array.from(radios).findIndex(in_radio => in_radio.checked);
			}
		});
		controlArr.push(control);
	});
	const partsArr = [
		'(',
		String(in_qIx + 1),
		'/',
		String(QUESTIONS.length),
		')',
		QHEADER
	]
	return new cCard({
		description : partsArr.join(' '),
		controlArr : controlArr,
		transition : (in_detail, in_controls) => {
			OPTIONS.forEach(in_option => {
				if (in_detail.option !== in_option) {
					return;
				}
				in_controls.forEach(in_ctrl => {
					if ((in_ctrl !== in_detail.control) && (in_ctrl.currOption === in_option)) {
						in_ctrl.setIx(cControl.UNSELECTED, true);
					}
				});
			});
			return OPTIONS.every(in_option => in_controls.some(in_ctrl => in_ctrl.currOption === in_option));
		}
	});
}

function uiStage2nd(in_result, in_resp) {
	const view = document.querySelector('#iStage2nd');
	view.replaceChildren();
	const bar = createUiBar(in_result.uiScores);
	view.appendChild(bar);
	const matrix = createUiMatrix(in_result.uiScores);
	view.appendChild(matrix);
	const trait = createUiTrait(in_result.uiTrait, in_resp);
	view.appendChild(trait);
	const retry = createUiRetry();
	view.appendChild(retry);
	if (in_resp && !in_resp.meta.isBedrockResponse) {
		// developer can use this for prompting
		console.log(in_resp.meta.debugInformation);
	}
}

const uiStage1st = (() => {
	const closure = {
		list : document.querySelector('#iTestList'),
		back : document.querySelector('#iBack'),
		lsKey : 'personalitytest',
		currIx : 0,
		cardArr : []
	};
	closure.list.addEventListener('cardCompleted', in_ev => {
		const prev = closure.cardArr[closure.currIx];
		prev.disable();
		if (closure.currIx < QUESTIONS.length - 1) {
			closure.currIx++;
			const curr = closure.cardArr[closure.currIx];
			curr.enable();
			const delayAfterAnswered = 200;
			setTimeout(() => scroll(curr, closure.list), delayAfterAnswered);
		} else {
			gState.transition(cState.DONE);
			(async () => {
				const result = composeResult(in_qIx => {
					const ixArr = closure.cardArr[in_qIx].currIxArr;
					return ixArr.findIndex(in_ix => in_ix === 0);
				});
				const resp = await cLLM.invoke({
					app : APP,
					summary : result.llmSummary,
					qa : result.llmQaArr,
					lang : i18n.browserLanguage
				});
				localStorage.setItem(closure.lsKey, JSON.stringify({result, resp}));
				gState.transition(cState.DONE);
				uiStage2nd(result, resp);
			})();
		}
	});
	closure.back.addEventListener('click', in_ev => {
		if (closure.currIx === 0) {
			return;
		} else {
			const prev = closure.cardArr[closure.currIx];
			prev.disable();
		}
		closure.currIx--;
		const curr = closure.cardArr[closure.currIx];
		scroll(curr, closure.list);
		const handler = () => {
			curr.enable();
			curr.reset(cControl.UNSELECTED);
			closure.list.removeEventListener('transitionend', handler);
		};
		closure.list.addEventListener('transitionend', handler);
	});
	return (in_useCache = true) => {
		const stored = localStorage.getItem(closure.lsKey);
		if (in_useCache && stored) {
			const {result, resp} = JSON.parse(stored);
			gState.transition(cState.SKIP);
			uiStage2nd(result, resp);
		} else {
			// shuffle
			QUESTIONS.sort(() => Math.random() - 0.5);
			for (let i = 0; i < QUESTIONS.length; i++) {
				const sortedArr = Object.entries(QUESTIONS[i]).sort(() => Math.random() - 0.5);
				QUESTIONS[i] = Object.fromEntries(sortedArr);
			}
			// reset contents
			closure.cardArr = [];
			closure.list.replaceChildren();
			// create contents
			for (let qIx = 0; qIx < QUESTIONS.length; qIx++) {
				const card = createUiCard(qIx);
				card.disable();
				closure.list.appendChild(card.domElem);
				closure.cardArr.push(card);
			}
			closure.currIx = 0;
			closure.cardArr[0].enable();
			scroll(closure.cardArr[0], closure.list);
			const view = document.querySelector('#iStage1st');
			view.style.height = closure.cardArr[0].domElem.offsetHeight * 2.0 + 'px';
		}
	};
})();

const TESTHASH = '487b91042c7cf27a19e23ea8699f5f354b1a0c3af9e418138dc6150d830f970d';

(async () => {
	cLLM.activate();
	const maxLen = QUESTIONS.reduce((in_max, in_opt) => {
		const lengthArr = Object.values(in_opt).map(in_text => in_text.length);
		return Math.max(in_max, ...lengthArr);
	}, 0);
	const rootStyle = document.documentElement.style;
	rootStyle.setProperty('--question-width', (maxLen + 1.5) + 'em');
	if (await queryHashIs('mode', TESTHASH)) {
		uiStage1st(false);
		gState.transition(cState.DONE);
		const result = composeResult(() => {
			const randomChoice = Object.keys(QUESTIONS[0]).sort(() => Math.random() - 0.5).slice(0, 2);
			return {
				aPosiKey : randomChoice[0],
				aNegaKey : randomChoice[1]
			};
		});
		const resp = await cLLM.invoke({
			app : APP,
			summary : result.llmSummary,
			qa : result.llmQaArr,
			lang : i18n.browserLanguage
		});
		gState.transition(cState.DONE);
		uiStage2nd(result, resp);
	} else {
		uiStage1st(true);
	}
})();
