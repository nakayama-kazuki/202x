<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LLMJ Feedback</title>

<style>

body {
    font-family: sans-serif;
    margin: 20px;
}

h1 {
    margin-bottom: 30px;
}

h2 {
    border-bottom: 2px solid #888;
    padding-bottom: 4px;
    margin-top: 40px;
}

table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
}

th,
td {
    border: 1px solid #ccc;
    padding: 10px;
    vertical-align: top;
}

th {
    background: #eee;
    text-align: left;
}

.reason,
.proposal {
    white-space: pre-wrap;
    line-height: 1.5;
}

</style>

</head>
<body>

<h1>LLMJ Feedback Report</h1>

<div id="rubrics"></div>

<div id="gold"></div>

<script>

const DATA = __JSON__;

function escapeHtml(text) {
    return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
}

function buildSection(title, headers, rows) {
    let html = '<h2>' + title + '</h2>';

    if (rows.length === 0) {
        html += '<p>No suggestions.</p>';
        return html;
    }

    html += '<table>';

    html += '<tr>';
    for (const header of headers) {
        html += '<th>' + header + '</th>';
    }
    html += '</tr>';

    for (const row of rows) {
        html += '<tr>';
        for (const cell of row) {
            html += '<td>' + cell + '</td>';
        }
        html += '</tr>';
    }

    html += '</table>';

    return html;
}

document.getElementById('rubrics').innerHTML = buildSection(
    'Rubric Suggestions',
    ['Rubric', 'Reason', 'Proposal'],
    DATA.rubrics.map(rubric => [
        escapeHtml(rubric.name),
        '<div class="reason">' + escapeHtml(rubric.reason) + '</div>',
        '<div class="proposal">' + escapeHtml(rubric.proposal) + '</div>'
    ])
);

document.getElementById('gold').innerHTML = buildSection(
    'Gold Dataset Suggestions',
    ['Article', 'Reason', 'Proposal'],
    DATA.gold.map(gold => [
        '#' + gold.articleIndex,
        '<div class="reason">' + escapeHtml(gold.reason) + '</div>',
        '<div class="proposal">' + escapeHtml(gold.proposal) + '</div>'
    ])
);

</script>

</body>
</html>
